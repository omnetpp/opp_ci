{% extends "base.html" %}
{% block title %}opp_ci — New Compiler{% endblock %}
{% block content %}
<h2 style="margin-bottom: 1rem;">New Compiler</h2>

<div class="card">
    <form method="post" action="/compilers/new">

        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <div class="form-row">
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" name="name" id="name" required placeholder="e.g. gcc, clang">
            </div>
            <div class="form-group">
                <label for="version">Version</label>
                <input type="text" name="version" id="version" placeholder="e.g. 14, 18">
            </div>
        </div>
        <div class="actions">
            <button type="submit" class="btn btn-success">Add</button>
            <a href="/compilers" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
