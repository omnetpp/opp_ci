{% extends "base.html" %}
{% block title %}opp_ci — Start New Run{% endblock %}
{% block content %}
<h2 style="margin-bottom: 1rem;">Start New Test Run</h2>

{% if message %}
<div class="flash flash-{{ message_type or 'success' }}">{{ message }}</div>
{% endif %}

<div class="card">
    <h2>Single Run</h2>
    <form method="post" action="/runs/new">
        <div class="form-row">
            <div class="form-group">
                <label for="project">Project</label>
                <select name="project" id="project" required>
                    <option value="">— select —</option>
                    {% for p in projects %}
                    <option value="{{ p.name }}">{{ p.name }} (tier {{ p.tier }})</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label for="test_type">Test Type</label>
                <select name="test_type" id="test_type" required>
                    <option value="smoke">smoke</option>
                    <option value="fingerprint">fingerprint</option>
                    <option value="statistical">statistical</option>
                    <option value="build">build</option>
                    <option value="module">module</option>
                    <option value="unit">unit</option>
                    <option value="chart">chart</option>
                    <option value="feature">feature</option>
                    <option value="packet">packet</option>
                    <option value="queueing">queueing</option>
                    <option value="protocol">protocol</option>
                    <option value="validation">validation</option>
                    <option value="sanitizer">sanitizer</option>
                    <option value="speed">speed</option>
                </select>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label for="mode">Build Mode</label>
                <select name="mode" id="mode">
                    <option value="">— default —</option>
                    <option value="release">release</option>
                    <option value="debug">debug</option>
                </select>
            </div>
            <div class="form-group">
                <label for="git_ref">Git Ref (optional)</label>
                <input type="text" name="git_ref" id="git_ref" placeholder="master, topic/feature, v4.5.0, etc.">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label for="os">OS (optional)</label>
                <select name="os" id="os">
                    <option value="">— any —</option>
                    {% for o in os_entries %}
                    <option value="{{ o.name }}">{{ o.label }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label for="compiler">Compiler (optional)</label>
                <select name="compiler" id="compiler">
                    <option value="">— any —</option>
                    {% for c in compilers %}
                    <option value="{{ c.name }}">{{ c.label }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>
        <button type="submit" class="btn btn-success">Queue Run</button>
    </form>
</div>

<div class="card">
    <h2>Run from Matrix</h2>
    <form method="post" action="/runs/new/matrix">
        <div class="form-row">
            <div class="form-group">
                <label for="matrix_name">Matrix</label>
                <select name="matrix_name" id="matrix_name" required>
                    <option value="">— select matrix —</option>
                    {% for m in matrices %}
                    <option value="{{ m.name }}">{{ m.name }} ({{ m.project }})</option>
                    {% endfor %}
                </select>
            </div>
        </div>
        <button type="submit" class="btn btn-primary">Queue Matrix</button>
    </form>
</div>
{% endblock %}
