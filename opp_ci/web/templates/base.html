<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}opp_ci{% endblock %}</title>
    <style>
        :root {
            --bg: #f8f9fa;
            --surface: #ffffff;
            --text: #212529;
            --muted: #6c757d;
            --border: #dee2e6;
            --pass: #198754;
            --fail: #dc3545;
            --error: #fd7e14;
            --running: #0d6efd;
            --primary: #0d6efd;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; }
        a { color: var(--primary); text-decoration: none; }
        a:hover { text-decoration: underline; }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 1rem; }
        header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0.75rem 0; margin-bottom: 1.5rem; }
        header .container { display: flex; align-items: center; gap: 2rem; }
        header h1 { font-size: 1.25rem; font-weight: 700; }
        nav a { color: var(--muted); font-size: 0.9rem; font-weight: 500; }
        nav a:hover { color: var(--text); text-decoration: none; }

        .stats { display: flex; gap: 1rem; margin-bottom: 1.5rem; }
        .stat { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 1rem 1.5rem; flex: 1; }
        .stat .value { font-size: 1.5rem; font-weight: 700; }
        .stat .label { font-size: 0.8rem; color: var(--muted); text-transform: uppercase; }

        table { width: 100%; border-collapse: collapse; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
        th, td { padding: 0.6rem 0.8rem; text-align: left; border-bottom: 1px solid var(--border); font-size: 0.875rem; }
        th { background: var(--bg); font-weight: 600; color: var(--muted); font-size: 0.75rem; text-transform: uppercase; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #f1f3f5; }

        .badge { display: inline-block; padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; }
        .badge-passed { background: #d1e7dd; color: var(--pass); }
        .badge-failed { background: #f8d7da; color: var(--fail); }
        .badge-error { background: #ffe5d0; color: var(--error); }
        .badge-running { background: #cfe2ff; color: var(--running); }
        .badge-queued { background: #e2e3e5; color: var(--muted); }

        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 1.5rem; margin-bottom: 1rem; }
        .card h2 { font-size: 1rem; margin-bottom: 0.75rem; }

        pre { background: #1e1e1e; color: #d4d4d4; padding: 1rem; border-radius: 6px; overflow-x: auto; font-size: 0.8rem; line-height: 1.4; max-height: 400px; overflow-y: auto; }

        .filters { display: flex; gap: 0.5rem; margin-bottom: 1rem; align-items: center; }
        .filters input, .filters select { padding: 0.4rem 0.6rem; border: 1px solid var(--border); border-radius: 4px; font-size: 0.85rem; }
        .filters button { padding: 0.4rem 0.8rem; background: var(--primary); color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 0.85rem; }

        .empty { text-align: center; padding: 2rem; color: var(--muted); }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>opp_ci</h1>
            <nav>
                <a href="/">Dashboard</a> &nbsp;
                <a href="/runs">Runs</a>
            </nav>
        </div>
    </header>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
