{% extends "base.html" %}
{% block title %}opp_ci — OS: {{ os.label }}{% endblock %}
{% block content %}
<h2 style="margin-bottom: 1rem;">OS: {{ os.label }}</h2>

<div class="card">
    <h2>Details</h2>
    <table>
        <tr><th style="width:150px;">ID</th><td>{{ os.id }}</td></tr>
        <tr><th>Name</th><td>{{ os.name }}</td></tr>
        <tr><th>Version</th><td>{{ os.version or "-" }}</td></tr>
        <tr><th>Architecture</th><td>{{ os.arch }}</td></tr>
        <tr><th>Label <span class="derived-tag" title="computed: name + ' ' + version (name only when version is unset)">derived</span></th><td>{{ os.label }}</td></tr>
    </table>
</div>

<div class="actions">
    <form method="post" action="/os/{{ os.id }}/delete" class="inline-form">

        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <button type="submit" class="btn btn-danger btn-sm" onclick="return confirm('Delete {{ os.label }}?')">Delete</button>
    </form>
    <a href="/os" class="btn btn-secondary btn-sm">&larr; Back to OS list</a>
</div>
{% endblock %}
