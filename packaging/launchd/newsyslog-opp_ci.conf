# opp_ci worker log rotation for macOS's built-in newsyslog(8).
# Installed by packaging/launchd/install.sh to /etc/newsyslog.d/opp_ci.conf.
# This is the macOS analogue of journald retention (`journalctl --vacuum-time`)
# on the Linux systemd setup — see doc/launchd.md.
#
# logfilename                              [owner:group]  mode count size when flags
/usr/local/var/log/opp_ci/worker-*.log     opp_ci:opp_ci  644  7     5000 *    GN
#
# Fields: keep 7 generations, rotate at 5000 KB, any time (when=*). Flags:
#   G = treat logfilename as a glob (matches every per-worker log file)
#   N = don't signal a daemon after rotating — launchd reopens the path on
#       the next write, and the worker does not hold the file open across
#       rotations in a way that needs a HUP.
